type User @table {
  displayName: String!
  email: String!
  role: String!
  createdAt: Timestamp!
  photoUrl: String
  contactNumber: String
}

type Barangay @table {
  name: String!
  province: String!
  cityMunicipality: String!
  createdAt: Timestamp!
  population: Int
  description: String
}

type Project @table {
  title: String!
  description: String!
  budget: Float!
  startDate: Date!
  status: String!
  createdAt: Timestamp!
  createdBy: User
  barangay: Barangay
  endDate: Date
  location: String
  targetBeneficiaries: String
}

type Expense @table {
  amount: Float!
  description: String!
  expenseDate: Date!
  createdAt: Timestamp!
  project: Project
  recordedBy: User
  receiptUrl: String
  category: String
}

type ProjectUpdate @table {
  description: String!
  updateDate: Date!
  createdAt: Timestamp!
  project: Project
  postedBy: User
  photoUrls: [String]
  milestonesAchieved: String
}